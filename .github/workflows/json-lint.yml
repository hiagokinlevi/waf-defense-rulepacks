name: JSON Lint (Vendor Packs)

on:
  push:
  pull_request:

jobs:
  json-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate JSON syntax in vendor pack directories
        shell: bash
        run: |
          set -euo pipefail

          dirs=(
            cloudflare
            aws-waf
            azure-waf
            f5
            fortiweb
            imperva
            checkpoint
            generic
          )

          for dir in "${dirs[@]}"; do
            if [ -d "$dir" ]; then
              while IFS= read -r -d '' file; do
                echo "Checking $file"
                python -m json.tool "$file" > /dev/null
              done < <(find "$dir" -type f -name '*.json' -print0)
            fi
          done
